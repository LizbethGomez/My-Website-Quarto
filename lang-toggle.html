<script>
document.addEventListener('DOMContentLoaded', function () {
  var path = window.location.pathname;

  // Primary: check <html lang="..."> (set by Quarto when lang: es is in metadata)
  // Fallback: check if /es/ appears in the URL path
  var lang = (document.documentElement.lang || '').toLowerCase();
  var isES = lang.startsWith('es') || path.indexOf('/es/') !== -1;

  var enEl = document.querySelector('.lang-item.lang-en');
  var esEl = document.querySelector('.lang-item.lang-es');
  if (!enEl || !esEl) return;

  var enLink = enEl.querySelector('a');
  var esLink = esEl.querySelector('a');
  if (!enLink || !esLink) return;

  // Relative URLs — work at any base path or subdirectory
  var fileName = path.split('/').pop() || 'index.html';

  if (isES) {
    enLink.href = '../' + fileName;
    esEl.classList.add('lang-current');
    esLink.removeAttribute('href');
  } else {
    esLink.href = 'es/' + fileName;
    enEl.classList.add('lang-current');
    enLink.removeAttribute('href');
  }
});
</script>
