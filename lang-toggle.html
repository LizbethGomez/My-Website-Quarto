<script>
(function () {
  function buildToggle() {
    var anchor = document.getElementById('lang-toggle-anchor');
    if (!anchor) return;

    var path     = window.location.pathname;
    var isES     = path.indexOf('/es/') !== -1;
    var fileName = path.split('/').pop() || 'index.html';

    var enHref = isES ? ('../' + fileName) : null;
    var esHref = isES ? null : ('es/' + fileName);

    // Build toggle HTML with real hrefs — no placeholder # links
    var en = enHref
      ? '<a class="lang-item lang-en" href="' + enHref + '">en</a>'
      : '<span class="lang-item lang-en lang-current">en</span>';

    var es = esHref
      ? '<a class="lang-item lang-es" href="' + esHref + '">es</a>'
      : '<span class="lang-item lang-es lang-current">es</span>';

    var div = document.createElement('div');
    div.className = 'lang-toggle';
    div.innerHTML = en + ' · ' + es;

    anchor.parentNode.replaceChild(div, anchor);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', buildToggle);
  } else {
    buildToggle();
  }
})();
</script>
