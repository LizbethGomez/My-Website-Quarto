<script>
document.addEventListener('DOMContentLoaded', function () {
  // Use <html lang="..."> set by Quarto — reliable on any host or subdirectory
  var lang  = (document.documentElement.lang || 'en').toLowerCase();
  var isES  = lang.startsWith('es');

  var enEl = document.querySelector('.lang-item.lang-en');
  var esEl = document.querySelector('.lang-item.lang-es');
  if (!enEl || !esEl) return;

  var enLink = enEl.querySelector('a');
  var esLink = esEl.querySelector('a');
  if (!enLink || !esLink) return;

  // Get the current filename (e.g. "about.html", "index.html")
  var parts    = window.location.pathname.split('/');
  var fileName = parts[parts.length - 1] || 'index.html';

  if (isES) {
    // ES page → EN link goes UP one directory
    enLink.href = '../' + fileName;
    esEl.classList.add('lang-current');
    esLink.removeAttribute('href');
  } else {
    // EN page → ES link goes INTO es/ subfolder
    esLink.href = 'es/' + fileName;
    enEl.classList.add('lang-current');
    enLink.removeAttribute('href');
  }
});
</script>
